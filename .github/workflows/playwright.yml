name: White Stuff Playwright E2E

on:
  schedule:
    - cron: '5 4 * * *'   # Every day at 04:05 UTC → runs against PROD
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:        # Manual trigger — allows choosing environment
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  e2e-tests:
    name: Playwright E2E — ${{ github.event.inputs.environment || 'prod' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:desktop
        env:
          TEST_ENV: ${{ github.event.inputs.environment || 'prod' }}
          BASE_URL:            ${{ secrets.BASE_URL }}
          GUEST_EMAIL:         ${{ secrets.GUEST_EMAIL }}
          TEST_FIRST_NAME:     ${{ secrets.TEST_FIRST_NAME }}
          TEST_LAST_NAME:      ${{ secrets.TEST_LAST_NAME }}
          TEST_PHONE:          ${{ secrets.TEST_PHONE }}
          TEST_POSTCODE:       ${{ secrets.TEST_POSTCODE }}
          TEST_ADDRESS_LINE1:  ${{ secrets.TEST_ADDRESS_LINE1 }}
          TEST_ADDRESS_LINE2:  ${{ secrets.TEST_ADDRESS_LINE2 }}
          TEST_CITY:           ${{ secrets.TEST_CITY }}
          CARD_NUMBER:         ${{ secrets.CARD_NUMBER }}
          CARD_EXPIRY:         ${{ secrets.CARD_EXPIRY }}
          CARD_CVV:            ${{ secrets.CARD_CVV }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.event.inputs.environment || 'prod' }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.event.inputs.environment || 'prod' }}
          path: test-results/
          retention-days: 30
