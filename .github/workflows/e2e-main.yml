name: 🧪 E2E Tests — main PR & Scheduled

on:
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '5 4 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - staging
          - prod
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'e2e'
        type: choice
        options:
          - smoke
          - e2e

jobs:
  e2e-tests:
    name: E2E Tests (${{ github.event.inputs.environment || 'prod' }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          SUITE="${{ github.event.inputs.test_suite || 'e2e' }}"
          ENV="${{ github.event.inputs.environment || 'prod' }}"
          npm run "test:${SUITE}:${ENV}"
        env:
          TEST_ENV:           ${{ github.event.inputs.environment || 'prod' }}
          BASE_URL:           ${{ secrets.PROD_BASE_URL }}
          GUEST_EMAIL:        ${{ secrets.GUEST_EMAIL }}
          TEST_FIRST_NAME:    ${{ secrets.TEST_FIRST_NAME }}
          TEST_LAST_NAME:     ${{ secrets.TEST_LAST_NAME }}
          TEST_PHONE:         ${{ secrets.TEST_PHONE }}
          TEST_POSTCODE:      ${{ secrets.TEST_POSTCODE }}
          TEST_ADDRESS_LINE1: ${{ secrets.TEST_ADDRESS_LINE1 }}
          TEST_ADDRESS_LINE2: ${{ secrets.TEST_ADDRESS_LINE2 }}
          TEST_CITY:          ${{ secrets.TEST_CITY }}
          CARD_NUMBER:        ${{ secrets.CARD_NUMBER }}
          CARD_EXPIRY:        ${{ secrets.CARD_EXPIRY }}
          CARD_CVV:           ${{ secrets.CARD_CVV }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-${{ github.event.inputs.environment || 'prod' }}-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-failure-${{ github.run_number }}
          path: test-results/
          retention-days: 7
